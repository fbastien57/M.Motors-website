services:

  mysql:
    image: mysql:8
    container_name: mysql-vehicules
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

    expose:
      - "3306"

    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: spring-vehicules
    restart: always

    depends_on:
      - mysql

    ports:
      - "127.0.0.1:8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/vehicules
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    volumes:
      - ./uploads:/app/uploads

volumes:
  mysql_data: