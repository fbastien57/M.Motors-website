<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Documents')}">
    <link rel="stylesheet" th:href="@{/css/documents.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <!-- HEADER -->
    <div class="mb-5">

        <h1 class="fw-bold">
            Documents disponibles
        </h1>

        <p class="text-muted fs-5">
            Téléchargez les documents officiels nécessaires
            à vos démarches.
        </p>

    </div>

    <!-- DOCUMENTS -->
    <div class="row g-4">

        <div class="col-12 col-md-6 col-lg-4"
             th:each="doc : ${documents}">

            <div class="card dashboard-card h-100">

                <div class="card-body p-4 d-flex flex-column">

                    <div class="mb-3 text-primary dashboard-icon">
                        <i class="bi bi-file-earmark-arrow-down"></i>
                    </div>

                    <h4 class="fw-bold"
                        th:text="${doc.name}">
                    </h4>

                    <p class="text-muted flex-grow-1"
                       th:text="${doc.description}">
                    </p>

                    <div class="mb-4">

                        <span class="badge bg-dark px-3 py-2"
                              th:text="${doc.category.label}">
                        </span>

                    </div>

                    <a class="btn btn-primary dashboard-btn"
                       th:href="@{'/' + ${doc.filePath}}"
                       target="_blank">

                        Télécharger

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
