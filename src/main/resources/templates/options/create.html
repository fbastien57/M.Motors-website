<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Ajouter une option - M.Motors')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="bg-light text-center py-4 border-bottom">
    <div class="container">
        <h2 class="fw-bold">Ajouter une option ⚙️</h2>
        <p class="text-muted">Créer une nouvelle option ou garantie</p>
    </div>
</section>

<section class="py-5">
    <div class="container d-flex justify-content-center">

        <div class="card shadow-sm border-0 w-100" style="max-width: 600px;">
            <div class="card-body p-4">

                <form th:action="@{/vehicles/{id}/options(id=${vehicleId})}"
                      th:object="${option}"
                      method="post">

                    <!-- NAME -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nom</label>
                        <input type="text" th:field="*{name}" class="form-control">
                        <div class="text-danger" th:errors="*{name}"></div>
                    </div>

                    <!-- TYPE -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Type</label>
                        <select th:field="*{type}" class="form-select">
                            <option value="">-- Choisir --</option>
                            <option th:each="t : ${T(com.projetLLD.V1.enums.OptionType).values()}"
                                    th:value="${t}"
                                    th:text="${t}">
                            </option>
                        </select>
                        <div class="text-danger" th:errors="*{type}"></div>
                    </div>

                    <!-- PRICE -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Prix (€)</label>
                        <input type="number" step="0.01" th:field="*{price}" class="form-control">
                        <div class="text-danger" th:errors="*{price}"></div>
                    </div>

                    <!-- DESCRIPTION -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Description</label>
                        <textarea th:field="*{description}" class="form-control"></textarea>
                    </div>

                    <div class="mt-4 d-flex justify-content-between">
                        <a th:href="@{/vehicles/{id}/options(id=${vehicleId})}"
                           class="btn btn-outline-secondary">Retour</a>

                        <button class="btn btn-success px-4">Créer</button>
                    </div>

                </form>

            </div>
        </div>

    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
