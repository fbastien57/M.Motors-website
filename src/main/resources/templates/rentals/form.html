<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Créer une offre LOA - M.Motors')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- TITLE -->
<section class="bg-light text-center py-4 border-bottom">
    <div class="container">
        <h2 class="fw-bold">Créer une offre LOA 🚗</h2>
        <p class="text-muted">Définissez les conditions de location</p>
    </div>
</section>

<!-- FORM -->
<section class="py-5">
    <div class="container d-flex justify-content-center">

        <div class="card shadow-sm border-0 w-100" style="max-width: 650px;">
            <div class="card-body p-4">

                <form th:action="@{/vehicles/{id}/rentals(id=${vehicleId})}"
                      th:object="${rental}"
                      method="post">

                    <!-- 💰 prix véhicule -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Prix véhicule (€)</label>
                        <input type="number"
                               class="form-control"
                               th:field="*{vehiclePrice}"
                               placeholder="Ex: 20000">
                        <div class="text-danger" th:errors="*{vehiclePrice}"></div>
                    </div>

                    <!-- 💰 apport -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Apport (€)</label>
                        <input type="number"
                               class="form-control"
                               th:field="*{deposit}"
                               placeholder="Ex: 3000">
                    </div>

                    <!-- 💰 mensualité de base -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mensualité de base (€)</label>
                        <input type="number"
                               class="form-control"
                               th:field="*{baseMonthlyPayment}"
                               placeholder="Ex: 350">
                    </div>

                    <!-- 📆 durées -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Durées disponibles</label>
                        <div class="form-check"
                             th:each="d : ${T(com.projetLLD.V1.enums.RentalDuration).values()}">

                            <input type="checkbox"
                                   th:value="${d}"
                                   th:field="*{allowedDurations}"
                                   class="form-check-input">

                            <label class="form-check-label"
                                   th:text="${d.months + ' mois'}">
                            </label>
                        </div>
                    </div>

                    <!-- 🚗 km -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Kilométrage annuel</label>
                        <div class="form-check"
                             th:each="k : ${T(com.projetLLD.V1.enums.AnnualMileage).values()}">

                            <input type="checkbox"
                                   th:value="${k}"
                                   th:field="*{allowedKmPerYear}"
                                   class="form-check-input">

                            <label class="form-check-label"
                                   th:text="${k.km + ' km'}">
                            </label>
                        </div>
                    </div>

                    <!-- BUTTONS -->
                    <div class="mt-4 d-flex justify-content-between">

                        <a th:href="@{/vehicles/{id}/sales(id=${vehicleId})}"
                           class="btn btn-outline-secondary">
                            Retour
                        </a>

                        <button class="btn btn-warning px-4">
                            Créer l’offre LOA
                        </button>

                    </div>

                </form>

            </div>
        </div>

    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
