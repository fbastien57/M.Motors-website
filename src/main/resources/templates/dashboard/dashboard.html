<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <h1>Dashboard</h1>

    <p>
        Bienvenue <strong th:text="${username}"></strong> 👋
    </p>

    <!-- Bloc utilisateur -->
    <div class="card mt-4">
        <div class="card-body">
            <h5>Informations utilisateur</h5>

            <p>Email : <span sec:authentication="name"></span></p>
        </div>
    </div>

    <!-- Bloc actions -->
    <div class="mt-4">

        <div sec:authorize="hasRole('ADMIN')">
            <a class="btn btn-danger" th:href="@{/admin}">
                Espace Admin
            </a>
        </div>

        <div sec:authorize="hasAnyRole('ADMIN','GESTIONNAIRE')">
            <a class="btn btn-warning" th:href="@{/vehicles}">
                Gérer les véhicules
            </a>
        </div>

        <div sec:authorize="isAuthenticated()">
            <a class="btn btn-primary" th:href="@{/public/sales}">
                Voir les offres
            </a>
        </div>

    </div>

</div>

</body>
</html>
