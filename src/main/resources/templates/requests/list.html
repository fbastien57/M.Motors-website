<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Mes demandes - M.Motors')}">
    <link rel="stylesheet" th:href="@{/css/clientRequest.css}">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- HEADER -->
<section class="bg-white border-bottom py-5 shadow-sm">

    <div class="container">

        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">

            <div>

                <h1 class="fw-bold mb-2">
                    <i class="bi bi-file-earmark-text text-primary me-2"></i>
                    Mes demandes
                </h1>

                <p class="text-muted fs-5 mb-0">
                    Consultez et suivez vos demandes de location et d'achat.
                </p>

            </div>

        </div>

    </div>

</section>

<!-- CONTENT -->
<section class="py-5">

    <div class="container">

        <!-- EMPTY -->
        <div th:if="${requests.isEmpty()}">

            <div class="card border-0 shadow-sm text-center p-5 rounded-4">

                <div class="display-1 text-primary mb-4">
                    <i class="bi bi-inbox"></i>
                </div>

                <h3 class="fw-bold mb-3">
                    Aucune demande
                </h3>

                <p class="text-muted fs-5">
                    Vous n'avez encore effectué aucune demande.
                </p>

            </div>

        </div>

        <!-- REQUEST LIST -->
        <div class="row g-4"
             th:if="${!requests.isEmpty()}">

            <div class="col-12 col-md-6 col-xl-4"
                 th:each="request : ${requests}">

                <div class="card border-0 shadow-sm h-100 rounded-4 request-card">

                    <div class="card-body p-4 d-flex flex-column">

                        <!-- HEADER -->
                        <div class="d-flex justify-content-between align-items-start mb-4">

                            <div>

                                <small class="text-muted d-block">
                                    Demande
                                </small>

                                <h4 class="fw-bold mb-0">
                                    #<span th:text="${request.id}"></span>
                                </h4>

                            </div>

                            <!-- STATUS -->
                            <span class="badge rounded-pill px-3 py-2 fw-semibold"
                                  th:classappend="
                                    ${request.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                    (${request.status.name() == 'VALIDATED'} ? 'bg-success' :
                                    (${request.status.name() == 'REJECTED'} ? 'bg-danger' :
                                    'bg-secondary'))"

                                  th:text="${request.status.label}">
                            </span>

                        </div>

                        <!-- VEHICLE -->
                        <div class="mb-4">

                            <small class="text-muted d-block mb-1">
                                Véhicule
                            </small>

                            <h5 class="fw-semibold">

                                <span th:text="${request.vehicle.brand}"></span>

                                <span th:text="${request.vehicle.model}"></span>

                            </h5>

                        </div>

                        <!-- TYPE -->
                        <div class="mb-4">

                            <small class="text-muted d-block mb-2">
                                Type de demande
                            </small>

                            <span class="badge bg-dark px-3 py-2 rounded-pill"
                                  th:text="${request.type.label}">
                            </span>

                        </div>

                        <!-- DATE -->
                        <div class="mt-auto">

                            <small class="text-muted d-flex align-items-center mb-4">

                                <i class="bi bi-calendar-event me-2"></i>

                                Créée le
                                <span class="ms-1"
                                      th:text="${#temporals.format(request.createdAt, 'dd/MM/yyyy')}">
                                </span>

                            </small>

                            <!-- CTA -->
                            <a class="btn btn-primary w-100 py-2 rounded-3 fw-semibold"
                               th:href="@{'/client/requests/' + ${request.id}}">

                                <i class="bi bi-arrow-right-circle me-2"></i>

                                Voir la demande

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
