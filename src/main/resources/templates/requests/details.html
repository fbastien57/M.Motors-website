<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Ma demande - M.Motors')}">
    <link rel="stylesheet" th:href="@{/css/clientRequest.css}">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- HEADER -->
<section class="bg-white border-bottom shadow-sm py-5">

    <div class="container">

        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">

            <div>

                <h1 class="fw-bold mb-2">

                    Demande #<span th:text="${request.id}"></span>

                </h1>

                <p class="text-muted mb-0">

                    Créée le
                    <span th:text="${#temporals.format(request.createdAt, 'dd/MM/yyyy')}"></span>

                </p>

            </div>

            <!-- STATUS -->
            <span class="badge fs-6 px-4 py-3 rounded-pill fw-semibold"
                  th:classappend="
                    ${request.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                    (${request.status.name() == 'VALIDATED'} ? 'bg-success' :
                    (${request.status.name() == 'REJECTED'} ? 'bg-danger' :
                    'bg-secondary'))"

                  th:text="${request.status.label}">
            </span>

        </div>

    </div>

</section>

<!-- CONTENT -->
<section class="py-5">

    <div class="container">

        <div class="row g-4">

            <!-- VEHICLE -->
            <div class="col-lg-6">

                <div class="card border-0 shadow-sm rounded-4 h-100">

                    <div class="card-body p-4">

                        <h4 class="fw-bold mb-4">

                            <i class="bi bi-car-front me-2 text-primary"></i>

                            Véhicule

                        </h4>

                        <h5 class="fw-semibold mb-3"
                            th:text="${request.vehicle.brand + ' ' + request.vehicle.model}">
                        </h5>

                        <p class="text-muted mb-0">

                            <span th:text="${request.vehicle.year}"></span>

                            •

                            <span th:text="${request.vehicle.mileage}"></span> km

                        </p>

                    </div>

                </div>

            </div>

            <!-- TYPE -->
            <div class="col-lg-6">

                <div class="card border-0 shadow-sm rounded-4 h-100">

                    <div class="card-body p-4">

                        <h4 class="fw-bold mb-4">

                            <i class="bi bi-tag me-2 text-dark"></i>

                            Type de demande

                        </h4>

                        <span class="badge bg-dark px-4 py-3 fs-6 rounded-pill"
                              th:text="${request.type.label}">
                        </span>

                    </div>

                </div>

            </div>

        </div>

        <!-- OPTIONS -->
        <div class="card border-0 shadow-sm rounded-4 mt-4">

            <div class="card-body p-4">

                <h4 class="fw-bold mb-4">

                    <i class="bi bi-check2-square me-2 text-success"></i>

                    Options sélectionnées

                </h4>

                <div th:if="${request.options.isEmpty()}">

                    <p class="text-muted mb-0">
                        Aucune option sélectionnée.
                    </p>

                </div>

                <div class="list-group list-group-flush"
                     th:if="${!request.options.isEmpty()}">

                    <div class="list-group-item border-0 px-0 py-3 d-flex justify-content-between align-items-center"
                         th:each="opt : ${request.options}">

                        <span class="fw-medium"
                              th:text="${opt.name}">
                        </span>

                        <span class="badge bg-light text-dark border px-3 py-2"
                              th:text="${opt.price + ' €'}">
                        </span>

                    </div>

                </div>

            </div>

        </div>

        <!-- RENTAL DETAILS -->
        <div class="card border-0 shadow-sm rounded-4 mt-4"
             th:if="${request.type.name() == 'RENTAL'}">

            <div class="card-body p-4">

                <h4 class="fw-bold mb-4">

                    <i class="bi bi-calendar-range me-2 text-warning"></i>

                    Détails location

                </h4>

                <div class="row g-4">

                    <div class="col-md-4">

                        <div class="bg-light rounded-3 p-3">

                            <small class="text-muted d-block">
                                Durée
                            </small>

                            <h5 class="fw-bold mb-0"
                                th:text="${request.rentalDetails.duration.label}">
                            </h5>

                        </div>

                    </div>

                    <div class="col-md-4">

                        <div class="bg-light rounded-3 p-3">

                            <small class="text-muted d-block">
                                KM / an
                            </small>

                            <h5 class="fw-bold mb-0"
                                th:text="${request.rentalDetails.kmPerYear.label}">
                            </h5>

                        </div>

                    </div>

                    <div class="col-md-4">

                        <div class="bg-light rounded-3 p-3">

                            <small class="text-muted d-block">
                                Apport
                            </small>

                            <h5 class="fw-bold mb-0">
                                <span th:text="${request.rentalDetails.deposit}"></span> €
                            </h5>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- DOCUMENTS -->
        <div class="mt-5">

            <h3 class="fw-bold mb-4">

                <i class="bi bi-folder2-open me-2 text-primary"></i>

                Documents

            </h3>

            <div class="row g-4">

                <div class="col-md-6"
                     th:each="doc : ${request.documents}">

                    <div class="card border-0 shadow-sm rounded-4 h-100">

                        <div class="card-body p-4">

                            <!-- DOC HEADER -->
                            <div class="d-flex justify-content-between align-items-start mb-3">

                                <h5 class="fw-bold mb-0"
                                    th:text="${doc.type.label}">
                                </h5>

                                <span class="badge rounded-pill px-3 py-2"
                                      th:classappend="${doc.status.name() == 'VALIDATED'} ? 'bg-success' :
                                      (${doc.status.name() == 'REJECTED'} ? 'bg-danger' : 'bg-warning text-dark')"

                                      th:text="${doc.status.label}">
                                </span>

                            </div>

                            <!-- REJECTION -->
                            <div class="alert alert-danger"
                                 th:if="${doc.rejectionReason != null}">

                                <i class="bi bi-exclamation-triangle me-2"></i>

                                <span th:text="${doc.rejectionReason}"></span>

                            </div>

                            <!-- FILE -->
                            <a th:if="${doc.filePath != null}"
                               th:href="@{'/' + ${doc.filePath}}"
                               target="_blank"
                               class="btn btn-outline-dark w-100 mb-3 rounded-3">

                                <i class="bi bi-file-earmark-arrow-down me-2"></i>

                                Voir le document

                            </a>

                            <!-- UPLOAD -->
                            <form th:action="@{'/client/documents/' + ${request.id} + '/upload'}"
                                  method="post"
                                  enctype="multipart/form-data">

                                <input type="hidden"
                                       name="type"
                                       th:value="${doc.type}"/>

                                <input type="file"
                                       name="file"
                                       required
                                       accept=".pdf,.jpg,.jpeg,.png"
                                       class="form-control mb-3">

                                <button class="btn btn-warning w-100 rounded-3 fw-semibold">

                                    <i class="bi bi-upload me-2"></i>

                                    Envoyer

                                </button>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
