<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" >
<body th:fragment="navbar">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <!-- Logo à gauche -->
        <a class="navbar-brand fw-bold" th:href="@{/}" th:text="'M.Motors'">M.Motors</a>

        <!-- Bouton toggle pour mobile -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu à droite -->
        <div class="collapse navbar-collapse justify-content-end" id="mainNavbar">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}" th:text="'Accueil'">Accueil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/vehicles}" th:text="'Véhicules'">Véhicules</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/public/sales}" th:text="'Achat'">Achat</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/public/rentals}" th:text="'Location'">Location</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" th:text="'À propos'">À propos</a>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link btn btn-light ms-2" th:href="@{/login}">
                        Se connecter
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link btn btn-light ms-2" th:href="@{/register}">
                        S’inscrire
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link btn btn-light ms-2" th:href="@{/dashboard}">
                        Mon compte
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" style="display:inline;">
                        <button class="nav-link btn btn-danger ms-2" type="submit">
                            Se déconnecter
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
