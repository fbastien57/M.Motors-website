<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Véhicules - M.Motors')}"></head>

<body>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- TITLE -->
<section class="bg-light text-center py-4 border-bottom">
    <div class="container">
        <h2 class="fw-bold">Nos véhicules 🚗</h2>
        <p class="text-muted">Découvrez toutes nos voitures disponibles</p>
    </div>
</section>

<div class="mt-4 d-flex justify-content-center">
    <a th:href="@{/vehicles/new}" class="btn btn-success px-4 py-2 fw-semibold shadow-sm">
        ➕ Ajouter un véhicule
    </a>
</div>

<!-- LIST -->
<section class="py-5">
    <div class="container">

        <div class="row g-4">

            <div class="col-md-4" th:each="vehicle : ${vehicles}">

                <div class="card h-100 shadow-sm border-0 hover-scale">

                    <!-- IMAGE PRINCIPALE -->
                    <img th:if="${!vehicle.photos.isEmpty()}"
                         th:src="@{'/' + ${vehicle.photos[0].filePath}}"
                         class="card-img-top"
                         style="height: 200px; object-fit: cover;">

                    <!-- IMAGE PAR DÉFAUT -->
                    <img th:if="${vehicle.photos.isEmpty()}"
                         src="/image/default-car.jpg"
                         class="card-img-top"
                         style="height: 200px; object-fit: cover;">

                    <div class="card-body text-center">

                        <!-- BRAND + MODEL -->
                        <h5 class="fw-bold"
                            th:text="${vehicle.brand + ' ' + vehicle.model}">
                        </h5>

                        <p class="text-muted mb-2">
                            <span th:text="${vehicle.year}"></span> •
                            <span th:text="${vehicle.mileage}"></span> km
                        </p>

                        <!-- BADGE DISPONIBLE -->
                        <span class="badge bg-success"
                              th:if="${vehicle.available}">
                            Disponible
                        </span>

                        <span class="badge bg-secondary"
                              th:if="${!vehicle.available}">
                            Indisponible
                        </span>

                        <!-- EDIT BUTTON -->
                        <div class="mt-3 d-grid gap-2">

                            <a th:href="@{/vehicles/{id}/edit(id=${vehicle.id})}"
                               class="btn btn-primary w-100">
                                Modifier
                            </a>

                            <a th:href="@{/vehicles/{id}/sales(id=${vehicle.id})}"
                               class="btn btn-outline-primary w-100">
                                Voir les offres
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>
</section>

<!-- FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

<style>
    .hover-scale {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .hover-scale:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
</style>

</body>
</html>
