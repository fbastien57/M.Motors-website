<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Offres - M.Motors')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- TITLE -->
<section class="bg-light text-center py-4 border-bottom">
    <div class="container">
        <h2 class="fw-bold">Offres du véhicule 💰</h2>
        <p class="text-muted">Ventes et locations disponibles</p>
    </div>
</section>

<!-- ===================== -->
<!-- 💰 OFFRES DE VENTE -->
<!-- ===================== -->

<section class="py-5">
    <div class="container">

        <div class="row">

            <!-- ===================== -->
            <!-- 💰 VENTES (GAUCHE) -->
            <!-- ===================== -->
            <div class="col-md-6 border-end pe-4 text-center">

                <h4 class="fw-bold mb-3 mt-3">💰 Offres de vente</h4>

                <!-- bouton centré -->
                <div th:if="${#lists.isEmpty(sales)}" class="mb-4">
                    <a th:href="@{/vehicles/{id}/sales/new(id=${vehicleId})}"
                       class="btn btn-success px-4 py-2 shadow-sm">
                        ➕ Ajouter une offre de vente
                    </a>
                </div>

                <div class="row g-3">

                    <div class="col-12" th:each="sale : ${sales}">

                        <div class="card shadow-sm border-0 hover-scale">

                            <div class="card-body text-center">

                                <h5 class="fw-bold"
                                    th:text="${sale.salePrice + ' €'}"></h5>

                                <span class="badge bg-success" th:if="${sale.available}">
                        Disponible
                    </span>

                                <span class="badge bg-secondary" th:if="${!sale.available}">
                        Indisponible
                    </span>

                                <div class="mt-3 d-grid gap-2">

                                    <a th:href="@{/sales/{id}/edit(id=${sale.id})}"
                                       class="btn btn-primary btn-sm">
                                        Modifier
                                    </a>

                                    <form th:action="@{/sales/{id}/delete(id=${sale.id})}"
                                          method="post"
                                          onsubmit="return confirm('Supprimer cette offre ?');">

                                        <button class="btn btn-danger btn-sm w-100">
                                            Supprimer
                                        </button>

                                    </form>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <!-- ===================== -->
            <!-- 🚗 LOCATION (DROITE) -->
            <!-- ===================== -->
            <div class="col-md-6 ps-4 text-center">

                <h4 class="fw-bold mb-3 mt-3">🚗 Offres de location (LOA)</h4>

                <!-- bouton centré -->
                <div th:if="${#lists.isEmpty(rentals)}" class="mb-4">
                    <a th:href="@{/vehicles/{id}/rentals/new(id=${vehicleId})}"
                       class="btn btn-warning px-4 py-2 shadow-sm">
                        ➕ Ajouter une offre de location
                    </a>
                </div>

                <div class="row g-3">

                    <div class="col-12" th:each="rental : ${rentals}">

                        <div class="card shadow-sm border-0 hover-scale">

                            <div class="card-body text-center">

                                <h5 class="fw-bold"
                                    th:text="${rental.vehiclePrice + ' €'}"></h5>

                                <p class="text-muted mb-1">
                                    <span th:text="${rental.baseMonthlyPayment}"></span> € / mois
                                </p>

                                <p class="text-muted small mb-1">
                                    Durées :
                                    <span th:each="d : ${rental.allowedDurations}"
                                          th:text="${d.months + 'm '}"></span>
                                </p>

                                <p class="text-muted small">
                                    Km :
                                    <span th:each="k : ${rental.allowedKmPerYear}"
                                          th:text="${k.km + 'km '}"></span>
                                </p>

                                <span class="badge bg-success" th:if="${rental.available}">
                        Disponible
                    </span>

                                <span class="badge bg-secondary" th:if="${!rental.available}">
                        Indisponible
                    </span>

                                <div class="mt-3 d-grid gap-2">

                                    <a th:href="@{/rentals/{id}/edit(id=${rental.id})}"
                                       class="btn btn-primary btn-sm">
                                        Modifier
                                    </a>

                                    <form th:action="@{/rentals/{id}/delete(id=${rental.id})}"
                                          method="post"
                                          onsubmit="return confirm('Supprimer cette location ?');">

                                        <button class="btn btn-danger btn-sm w-100">
                                            Supprimer
                                        </button>

                                    </form>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

<style>
    .hover-scale {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .hover-scale:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
</style>

</body>
</html>
