<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Modifier une offre - M.Motors')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- TITLE -->
<section class="bg-light text-center py-4 border-bottom">
    <div class="container">
        <h2 class="fw-bold">Modifier l’offre ✏️</h2>
        <p class="text-muted">Mettez à jour les informations</p>
    </div>
</section>

<!-- FORM -->
<section class="py-5">
    <div class="container d-flex justify-content-center">

        <div class="card shadow-sm border-0 w-100" style="max-width: 600px;">
            <div class="card-body p-4">

                <form th:action="@{/sales/{id}/update(id=${saleId})}"
                      th:object="${sale}"
                      method="post">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Prix (€)</label>
                        <input type="number"
                               th:field="*{salePrice}"
                               class="form-control">
                        <div class="text-danger" th:errors="*{salePrice}"></div>
                    </div>

                    <div class="form-check mb-3">
                        <input type="checkbox"
                               th:field="*{available}"
                               class="form-check-input">
                        <label class="form-check-label fw-bold">
                            Disponible
                        </label>
                    </div>

                    <div class="mt-4 d-flex justify-content-between">

                        <a href="/vehicles" class="btn btn-outline-secondary">
                            Retour
                        </a>

                        <button class="btn btn-primary px-4">
                            Modifier
                        </button>

                    </div>

                </form>

            </div>
        </div>

    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
