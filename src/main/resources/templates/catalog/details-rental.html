<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">

<head th:replace="~{fragments/header :: header('Location véhicule')}">
    <link rel="stylesheet" th:href="@{/css/details.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- TITLE -->
<section class="bg-light py-4 border-bottom">
    <div class="container">
        <h2 class="fw-bold" th:text="${vehicle.brand + ' ' + vehicle.model}"></h2>
        <p class="text-muted">
            <span th:text="${vehicle.year}"></span> •
            <span th:text="${vehicle.mileage}"></span> km
        </p>
    </div>
</section>

<section class="py-5">
    <div class="container">
        <div class="row g-4">

            <!-- IMAGES -->
            <div class="col-md-7">
                <img id="mainImage"
                     th:src="${vehicle.photos.isEmpty()} ? '/image/default-car.jpg' : '/' + ${vehicle.photos[0].filePath}"
                     class="img-fluid rounded shadow-sm mb-3 main-image">

                <div class="d-flex gap-2 flex-wrap">
                    <img th:each="photo : ${vehicle.photos}"
                         th:src="@{'/' + ${photo.filePath}}"
                         class="thumb"
                         style="width:100px;height:70px;object-fit:cover;cursor:pointer;">
                </div>
            </div>

            <!-- INFOS LOCATION -->
            <div class="col-md-5">
                <div class="card shadow-sm border-0 p-3">

                    <h3 class="text-warning fw-bold">
                        À partir de <span th:text="${vehicle.rental.baseMonthlyPayment}"></span> € / mois
                    </h3>

                    <p class="small text-muted">
                        Durées :
                        <span th:each="d : ${vehicle.rental.allowedDurations}"
                              th:text="${d.months + 'm '}"></span>
                    </p>

                    <p class="text-muted small">
                        km :
                        <span th:each="k : ${vehicle.rental.allowedKmPerYear}"
                              th:text="${k.km + 'km '}"></span>
                    </p>

                    <p><strong>Apport :</strong>
                        <span th:text="${vehicle.rental.deposit}"></span> €
                    </p>

                    <hr>

                    <ul class="list-unstyled">
                        <li><strong>Carburant :</strong> <span th:text="${vehicle.fuelType}"></span></li>
                        <li><strong>Boîte :</strong> <span th:text="${vehicle.gearbox}"></span></li>
                    </ul>

                    <hr>

                    <div sec:authorize="isAuthenticated()">
                        <a th:href="@{'/client/requests/create/rental/' + ${vehicle.id}}"
                           class="btn btn-dark w-100">
                            Faire une demande de location
                        </a>
                    </div>

                    <!-- NON CONNECTÉ -->
                    <div sec:authorize="!isAuthenticated()">

                        <button class="btn btn-dark w-100" disabled>
                            Faire une demande de location
                        </button>

                        <div class="alert alert-warning mt-3 text-center">
                            Connectez-vous ou créez un compte pour faire une demande.
                        </div>

                        <a th:href="@{/login}" class="btn btn-outline-dark w-100 mt-2">
                            Se connecter
                        </a>

                </div>
            </div>

        </div>

        <!-- SIMULATEUR -->
        <div class="mt-5">

            <div class="card shadow-lg border-0 p-4" style="border-radius:15px;">

                <h5 class="fw-bold text-center mb-4">🚗 Simulation LOA</h5>

                <div class="mb-3">
                    <label>Durée</label>
                    <select id="duration" class="form-select">
                        <option th:each="d : ${vehicle.rental.allowedDurations}"
                                th:value="${d.months}"
                                th:text="${d.months + ' mois'}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>Kilométrage</label>
                    <select id="km" class="form-select">
                        <option th:each="k : ${vehicle.rental.allowedKmPerYear}"
                                th:value="${k.km}"
                                th:text="${k.km + ' km'}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>Options</label>

                    <div class="row">
                        <div class="col-6 mb-2" th:each="opt : ${vehicle.options}">
                            <div class="form-check border rounded p-2 option-box">

                                <input type="checkbox"
                                       class="form-check-input option-checkbox"
                                       th:value="${opt.price}">

                                <label class="form-check-label">
                                    <span th:text="${opt.name}"></span>
                                    (+<span th:text="${opt.price}"></span> €)
                                </label>

                            </div>
                        </div>
                    </div>

                </div>

                <div class="bg-dark text-white text-center p-4 rounded">
                    <small>Mensualité</small>
                    <h2>
                        <span id="resultPrice" th:text="${vehicle.rental.baseMonthlyPayment}"></span> €
                    </h2>
                </div>

            </div>

        </div>

    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:inline="javascript">
    const basePrice = [[${vehicle.rental.baseMonthlyPayment}]];
</script>

<script th:src="@{/js/details.js}"></script>

</body>
</html>
