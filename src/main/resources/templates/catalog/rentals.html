<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Véhicules en location - M.Motors')}"></head>

<body>

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- TITLE -->
<section class="bg-light text-center py-4 border-bottom">
    <div class="container">
        <h2 class="fw-bold">Véhicules en location 🚗</h2>
        <p class="text-muted">Découvrez nos offres LOA disponibles</p>
    </div>
</section>

<!-- LIST -->
<section class="py-5">
    <div class="container">

        <div class="row g-4">

            <div class="col-md-4" th:each="vehicle : ${vehicles}">

                <div class="card h-100 shadow-sm border-0 hover-scale">

                    <!-- IMAGE -->
                    <img th:if="${!vehicle.photos.isEmpty()}"
                         th:src="@{'/' + ${vehicle.photos[0].filePath}}"
                         class="card-img-top"
                         style="height: 200px; object-fit: cover;">

                    <img th:if="${vehicle.photos.isEmpty()}"
                         src="/image/default-car.jpg"
                         class="card-img-top"
                         style="height: 200px; object-fit: cover;">

                    <div class="card-body text-center">

                        <!-- PRIX -->
                        <h4 class="fw-bold text-warning">
                            <span th:text="${vehicle.rental.baseMonthlyPayment}"></span> € / mois
                        </h4>

                        <!-- TITRE -->
                        <h5 class="fw-bold"
                            th:text="${vehicle.brand + ' ' + vehicle.model}"></h5>

                        <!-- INFOS -->
                        <p class="text-muted mb-1">
                            <span th:text="${vehicle.year}"></span> •
                            <span th:text="${vehicle.mileage}"></span> km
                        </p>

                        <!-- DURÉES -->
                        <p class="text-muted small mb-1">
                            <span th:each="d : ${vehicle.rental.allowedDurations}"
                                  th:text="${d.months + 'm '}"></span>
                        </p>

                        <!-- KM -->
                        <p class="text-muted small">
                            <span th:each="k : ${vehicle.rental.allowedKmPerYear}"
                                  th:text="${k.km + 'km '}"></span>
                        </p>

                        <!-- BADGE -->
                        <span class="badge bg-success"
                              th:if="${vehicle.rental.available}">
                            Disponible
                        </span>

                        <!-- CTA -->
                        <div class="mt-3 d-grid">
                            <a th:href="@{/vehicles/{id}(id=${vehicle.id})}"
                               class="btn btn-warning">
                                Voir details
                            </a>
                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- EMPTY -->
        <div th:if="${#lists.isEmpty(vehicles)}" class="text-center mt-5">
            <p class="text-muted">Aucune offre de location disponible</p>
        </div>

    </div>
</section>

<!-- FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

<style>
    .hover-scale {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .hover-scale:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
</style>

</body>
</html>
