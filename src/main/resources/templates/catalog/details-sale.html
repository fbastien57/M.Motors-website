<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">

<head th:replace="~{fragments/header :: header('Détail véhicule - Vente')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="bg-light py-4 border-bottom">
    <div class="container">
        <h2 class="fw-bold" th:text="${vehicle.brand + ' ' + vehicle.model}"></h2>
        <p class="text-muted">
            <span th:text="${vehicle.year}"></span> •
            <span th:text="${vehicle.mileage}"></span> km
        </p>
    </div>
</section>

<section class="py-5">
    <div class="container">

        <div class="row g-4">

            <!-- IMAGES -->
            <div class="col-md-7">

                <img id="mainImage"
                     th:src="${vehicle.photos.isEmpty()} ? '/image/default-car.jpg' : '/' + ${vehicle.photos[0].filePath}"
                     class="img-fluid rounded shadow-sm mb-3">

                <div class="d-flex gap-2 flex-wrap">
                    <img th:each="photo : ${vehicle.photos}"
                         th:src="@{'/' + ${photo.filePath}}"
                         class="thumb"
                         style="width:100px;height:70px;object-fit:cover;cursor:pointer;">
                </div>

            </div>

            <!-- INFOS -->
            <div class="col-md-5">

                <div class="card p-3 shadow-sm">

                    <h3 class="text-success fw-bold"
                        th:text="${vehicle.sale.salePrice + ' €'}"></h3>

                    <span class="badge bg-success"
                          th:if="${vehicle.sale.available}">
                        Disponible
                    </span>

                    <hr>

                    <ul class="list-unstyled">
                        <li><strong>Carburant :</strong> <span th:text="${vehicle.fuelType}"></span></li>
                        <li><strong>Boîte :</strong> <span th:text="${vehicle.gearbox}"></span></li>
                        <li><strong>Kilométrage :</strong> <span th:text="${vehicle.mileage}"></span></li>
                    </ul>

                    <!-- CONNECTÉ -->
                    <div sec:authorize="isAuthenticated()">
                        <a th:href="@{'/client/requests/create/sale/' + ${vehicle.id}}"
                           class="btn btn-success w-100">
                            🛒 Faire une demande d'achat
                        </a>
                    </div>

                    <!-- NON CONNECTÉ -->
                    <div sec:authorize="!isAuthenticated()">

                        <button class="btn btn-success w-100" disabled>
                            🛒 Faire une demande d'achat
                        </button>

                        <div class="alert alert-warning mt-3 text-center">
                            Connectez-vous ou créez un compte pour faire une demande.
                        </div>

                        <a th:href="@{/login}" class="btn btn-outline-dark w-100 mt-2">
                            Se connecter
                        </a>

                </div>

            </div>

        </div>

        <!-- DESCRIPTION -->
        <div class="mt-5">
            <h4>Description</h4>
            <p th:text="${vehicle.description}"></p>
        </div>

    </div>
</section>

</body>
</html>
