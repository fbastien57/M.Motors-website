<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Register - M.Motors')}"></head>

<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh;">

    <div class="card shadow-sm border-0 p-4" style="width: 100%; max-width: 450px;">

        <h3 class="text-center mb-4 fw-bold">Créer un compte</h3>

        <!-- ERROR -->
        <div th:if="${error}" class="alert alert-danger text-center">
            <span th:text="${error}"></span>
        </div>

        <!-- FORM -->
        <form th:action="@{/register}" th:object="${userRequestDTO}" method="post">

            <!-- FIRSTNAME -->
            <div class="mb-3">
                <label class="form-label">Prénom</label>
                <input type="text"
                       name="firstName"
                       class="form-control"
                       placeholder="Jean"
                       required>
            </div>

            <!-- LASTNAME -->
            <div class="mb-3">
                <label class="form-label">Nom</label>
                <input type="text"
                       name="lastName"
                       class="form-control"
                       placeholder="Dupont"
                       required>
            </div>

            <!-- EMAIL -->
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email"
                       name="email"
                       class="form-control"
                       placeholder="test@gmail.com"
                       required>
                <div class="text-danger small mt-1"
                     th:if="${#fields.hasErrors('email')}"
                     th:errors="*{email}">
                </div>
            </div>

            <!-- PASSWORD -->
            <div class="mb-3">
                <label class="form-label">Mot de passe</label>
                <input type="password"
                       name="password"
                       class="form-control"
                       minlength="12"
                       pattern="^(?=.*[A-Z])(?=.*[!@#$%^&*()_+=|&lt;&gt;?{}\\[\\]~-]).{12,}$"
                       placeholder="••••••••"
                       required>
                <div class="text-danger small mt-1"
                     th:if="${#fields.hasErrors('password')}"
                     th:errors="*{password}">
                </div>

                <div class="form-text">
                    Minimum 12 caractères,
                    une majuscule et un caractère spécial.
                </div>
            </div>

            <!-- SUBMIT -->
            <button type="submit" class="btn btn-success w-100">
                Créer mon compte
            </button>

        </form>

        <hr>

        <p class="text-center small">
            Déjà un compte ?
            <a th:href="@{/login}" class="text-decoration-none">Se connecter</a>
        </p>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
