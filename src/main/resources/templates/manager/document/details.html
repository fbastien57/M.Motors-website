<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Détail document')}">
    <link rel="stylesheet" th:href="@{/css/documents.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <!-- HEADER -->
    <div class="mb-5">

        <h1 class="fw-bold"
            th:text="${document.name}">
        </h1>

        <p class="text-muted fs-5"
           th:text="${document.description}">
        </p>

    </div>

    <!-- DETAIL -->
    <div class="card dashboard-card">

        <div class="card-body p-5">

            <div class="row g-4">

                <div class="col-md-6">

                    <div class="border rounded-4 p-4 h-100">

                        <h5 class="fw-bold mb-4">
                            Informations
                        </h5>

                        <p>
                            <strong>Catégorie :</strong>
                            <span th:text="${document.category.label}"></span>
                        </p>

                        <p>
                            <strong>Visible :</strong>

                            <span class="badge"
                                  th:classappend="${document.visible} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${document.visible ? 'Oui' : 'Non'}">
                            </span>

                        </p>

                        <p>

                            <strong>Date :</strong>

                            <span th:text="${#temporals.format(document.createdAt, 'dd/MM/yyyy HH:mm')}"></span>

                        </p>

                    </div>

                </div>

                <div class="col-md-6">

                    <div class="border rounded-4 p-4 h-100 d-flex flex-column justify-content-between">

                        <div>

                            <h5 class="fw-bold mb-3">
                                Actions
                            </h5>

                            <p class="text-muted">
                                Téléchargez ou gérez la visibilité
                                du document.
                            </p>

                        </div>

                        <div class="d-flex flex-column gap-3">

                            <a th:href="@{'/' + ${document.filePath}}"
                               class="btn btn-primary dashboard-btn"
                               target="_blank">

                                Télécharger

                            </a>

                            <form th:action="@{'/manager/documents/' + ${document.id} + '/toggle'}"
                                  method="post">

                                <button class="btn btn-warning dashboard-btn w-100">
                                    Activer / Désactiver
                                </button>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
