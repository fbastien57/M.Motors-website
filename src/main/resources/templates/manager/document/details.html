<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Détail document')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="py-4 bg-light border-bottom">
    <div class="container">
        <h2 th:text="${document.name}" class="fw-bold"></h2>
        <p class="text-muted" th:text="${document.description}"></p>
    </div>
</section>

<section class="py-5">
    <div class="container">

        <div class="card p-4">

            <p><strong>Catégorie :</strong> <span th:text="${document.category}"></span></p>

            <p><strong>Visible :</strong> <span th:text="${document.visible}"></span></p>

            <p><strong>Date :</strong>
                <span th:text="${#temporals.format(document.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
            </p>

            <hr>

            <a th:href="@{'/' + ${document.filePath}}"
               class="btn btn-primary"
               target="_blank">
                Télécharger
            </a>

            <form th:action="@{'/manager/documents/' + ${document.id} + '/toggle'}"
                  method="post"
                  class="mt-3">

                <button class="btn btn-warning">
                    Activer / Désactiver
                </button>

            </form>

        </div>

    </div>
</section>

</body>
</html>
