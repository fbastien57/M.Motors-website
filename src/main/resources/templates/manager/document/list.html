<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Gestion documents')}">
    <link rel="stylesheet" th:href="@{/css/documents.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <!-- HEADER -->
    <div class="mb-5">

        <h1 class="fw-bold">
            Gestion des documents
        </h1>

        <p class="text-muted fs-5">
            Upload et gestion des documents téléchargeables.
        </p>

    </div>

    <!-- UPLOAD -->
    <div class="card dashboard-card mb-5">

        <div class="card-body p-4">

            <div class="d-flex align-items-center mb-4">

                <div class="text-success dashboard-icon me-3">
                    <i class="bi bi-cloud-upload"></i>
                </div>

                <div>
                    <h4 class="fw-bold mb-0">
                        Ajouter un document
                    </h4>

                    <p class="text-muted mb-0">
                        Importez un nouveau document.
                    </p>
                </div>

            </div>

            <form th:action="@{/manager/documents/upload}"
                  method="post"
                  enctype="multipart/form-data">

                <div class="row g-3">

                    <div class="col-md-3">

                        <input name="name"
                               class="form-control"
                               placeholder="Nom du document">

                    </div>

                    <div class="col-md-3">

                        <input name="description"
                               class="form-control"
                               placeholder="Description">

                    </div>

                    <div class="col-md-3">

                        <select name="category"
                                class="form-select">

                            <option th:each="c : ${T(com.projetLLD.V1.enums.DocumentCategory).values()}"
                                    th:value="${c}"
                                    th:text="${c}">
                            </option>

                        </select>

                    </div>

                    <div class="col-md-3">

                        <input type="file"
                               name="file"
                               class="form-control">

                    </div>

                </div>

                <button class="btn btn-success dashboard-btn mt-4">
                    Upload
                </button>

            </form>

        </div>

    </div>

    <!-- TABLE -->
    <div class="card dashboard-card">

        <div class="card-body p-4">

            <div class="table-responsive">

                <table class="table align-middle table-hover">

                    <thead>

                    <tr>
                        <th>#</th>
                        <th>Nom</th>
                        <th>Catégorie</th>
                        <th>Visible</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="doc : ${documents}">

                        <td th:text="${doc.id}"></td>

                        <td class="fw-semibold"
                            th:text="${doc.name}">
                        </td>

                        <td>

                            <span class="badge bg-dark px-3 py-2"
                                  th:text="${doc.category.label}">
                            </span>

                        </td>

                        <td>

                            <span class="badge"
                                  th:classappend="${doc.visible} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${doc.visible ? 'Visible' : 'Masqué'}">
                            </span>

                        </td>

                        <td th:text="${#temporals.format(doc.createdAt, 'dd/MM/yyyy')}"></td>

                        <td>

                            <div class="d-flex flex-wrap gap-2">

                                <form th:action="@{'/manager/documents/' + ${doc.id} + '/toggle'}"
                                      method="post">

                                    <button class="btn btn-warning btn-sm">
                                        Visibilité
                                    </button>

                                </form>

                                <a th:href="@{'/' + ${doc.filePath}}"
                                   target="_blank"
                                   class="btn btn-primary btn-sm">

                                    Afficher

                                </a>

                                <form th:action="@{'/manager/documents/' + ${doc.id} + '/delete'}"
                                      method="post"
                                      onsubmit="return confirm('Supprimer ce document ?')">

                                    <button class="btn btn-danger btn-sm">
                                        Supprimer
                                    </button>

                                </form>

                            </div>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

</body>
</html>
