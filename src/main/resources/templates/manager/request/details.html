<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Détail demande')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="py-4 bg-light border-bottom">
    <div class="container">
        <h2>Demande #<span th:text="${request.id}"></span></h2>
        <p class="text-muted d-flex align-items-center gap-2">

            <span th:text="${request.user.firstName}"></span>

            •

            <span th:text="${request.vehicle.brand + ' ' + request.vehicle.model}"></span>

            <span class="badge"
                  th:classappend="
            ${request.status.name() == 'APPROVED'} ? 'bg-success' :
            (${request.status.name() == 'REJECTED'} ? 'bg-danger' :
            (${request.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
            'bg-secondary'))"
                  th:text="${request.status}">
    </span>

        </p>
    </div>
</section>

<section class="py-5">
    <div class="container">

        <!-- DOCUMENTS -->
        <h4 class="mb-3">Documents</h4>

        <div class="list-group">

            <div class="list-group-item"
                 th:each="doc : ${request.documents}">

                <div class="d-flex justify-content-between align-items-center">

                    <div>
                        <strong th:text="${doc.type}"></strong>

                        <span class="badge ms-2"
                              th:classappend="
                                ${doc.status.name() == 'UPLOADED'} ? 'bg-warning text-dark' :
                                (${doc.status.name() == 'VALIDATED'} ? 'bg-success' :
                                (${doc.status.name() == 'REJECTED'} ? 'bg-danger' :
                                'bg-secondary'))"
                              th:text="${doc.status}">
                        </span>

                        <div th:if="${doc.rejectionReason != null}"
                             class="text-danger small mt-1"
                             th:text="${doc.rejectionReason}">
                        </div>
                    </div>

                    <div class="d-flex gap-2">

                        <!-- VIEW FILE -->
                        <a th:if="${doc.filePath != null}"
                           th:href="@{'/' + ${doc.filePath}}"
                           target="_blank"
                           class="btn btn-sm btn-outline-primary">
                            Voir
                        </a>

                        <!-- VALIDATE -->
                        <form th:action="@{'/manager/requests/' + ${id} + '/documents/' + ${doc.id} + '/validate'}"
                              method="post">
                            <button class="btn btn-sm btn-success">
                                Valider
                            </button>
                        </form>

                        <!-- REJECT -->
                        <form th:action="@{'/manager/requests/' + ${id} + '/documents/' + ${doc.id} + '/reject'}"
                              method="post">

                            <input type="text"
                                   name="reason"
                                   placeholder="Motif"
                                   class="form-control form-control-sm d-inline-block"
                                   style="width:150px">

                            <button class="btn btn-sm btn-danger">
                                Refuser
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>
    <!-- SUCCESS -->
    <div th:if="${success}"
         class="alert alert-success">

        <span th:text="${success}"></span>

    </div>

    <!-- ERROR -->
    <div th:if="${error}"
         class="alert alert-danger">

        <span th:text="${error}"></span>

    </div>
    <!-- ACTIONS GESTIONNAIRE -->
    <div class="mb-4 d-flex gap-2" th:with="allValidated=${request.documents.^[#this.status.name() != 'VALIDATED'] == null}">

        <!-- APPROUVER -->
        <form th:action="@{'/manager/requests/' + ${request.id} + '/approve'}"
              method="post">

            <button class="btn btn-success"
                    th:disabled="${!allValidated}">
                Approuver la demande
            </button>
        </form>

        <!-- REFUSER -->
        <form th:action="@{'/manager/requests/' + ${request.id} + '/reject'}"
              method="post">

            <button class="btn btn-danger">
                Refuser la demande
            </button>
        </form>

    </div>
</section>

</body>
</html>
