<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Gestion des demandes')}">
    <link rel="stylesheet" th:href="@{/css/request.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <!-- HEADER -->
    <div class="mb-5">

        <h1 class="fw-bold">
            Gestion des demandes
        </h1>

        <p class="text-muted fs-5">
            Administration et suivi des demandes clients.
        </p>

    </div>

    <!-- TABLE CARD -->
    <div class="card dashboard-card">

        <div class="card-body p-4">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead>

                    <tr>
                        <th>#</th>
                        <th>Client</th>
                        <th>Véhicule</th>
                        <th>Statut</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="req : ${requests}">

                        <td th:text="${req.id}"></td>

                        <td class="fw-semibold"
                            th:text="${req.user.firstName + ' ' + req.user.lastName}">
                        </td>

                        <td th:text="${req.vehicle.brand + ' ' + req.vehicle.model}"></td>

                        <td>

                            <span class="badge px-3 py-2"
                                  th:classappend="
                                ${req.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                (${req.status.name() == 'REJECTED'} ? 'bg-danger' :
                                (${req.status.name() == 'APPROVED'} ? 'bg-success' :
                                'bg-secondary'))"
                                  th:text="${req.status.label}">
                            </span>

                        </td>

                        <td th:text="${#temporals.format(req.createdAt, 'dd/MM/yyyy HH:mm')}"></td>

                        <td>

                            <div class="d-flex flex-wrap gap-2">

                                <a class="btn btn-sm btn-primary"
                                   th:href="@{'/manager/requests/' + ${req.id}}">

                                    Voir

                                </a>

                                <form th:action="@{'/manager/requests/' + ${req.id} + '/delete'}"
                                      method="post">

                                    <button class="btn btn-sm btn-danger"
                                            onclick="return confirm('Supprimer cette demande ?')">

                                        Supprimer

                                    </button>

                                </form>

                            </div>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

</body>
</html>
